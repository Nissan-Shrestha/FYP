<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Wardrobe Admin</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        /* Using a tiny bit of inline style here just to ensure perfectly centered full-height layout */
        body {
            height: 100vh;
        }
    </style>
</head>
<body class="bg-light d-flex align-items-center justify-content-center">

    <div class="container d-flex justify-content-center">
        <div class="card shadow-sm border-0 rounded-3" style="width: 100%; max-width: 400px;">
            <div class="card-header bg-dark text-white text-center py-4 rounded-top">
                <h4 class="mb-0 fw-bold">
                    <i class="bi bi-briefcase-fill me-2 text-primary"></i>Wardrobe Admin
                </h4>
            </div>
            <div class="card-body p-4 p-md-5">
                <div id="login-error" class="alert alert-danger d-none py-2 px-3 small mb-3"></div>
                
                <form id="login-form">
                    
                    <!-- Email input -->
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="floatingEmail" placeholder="name@example.com" required>
                        <label for="floatingEmail">Email address</label>
                    </div>
                    
                    <!-- Password input -->
                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="floatingPassword" placeholder="Password" required>
                        <label for="floatingPassword">Password</label>
                    </div>

                    <!-- Remember me & Forgot Password -->
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="" id="rememberMe">
                            <label class="form-check-label text-secondary" for="rememberMe">
                                Remember me
                            </label>
                        </div>
                        <a href="#" class="text-decoration-none small text-primary">Forgot password?</a>
                    </div>

                    <!-- Submit Button -->
                    <button class="btn btn-primary w-100 py-2 fw-semibold fs-5" type="submit">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                    </button>
                    
                </form>
            </div>
            <div class="card-footer text-center bg-white py-3 border-0">
                <p class="text-muted small mb-0">&copy; 2026 FYP Wardrobe Admin</p>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Firebase SDK (using compat mode for simplicity in vanilla JS) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-auth-compat.js"></script>
    
    <!-- Auth script -->
    <script src="assets/js/auth.js"></script>
</body>
</html>
