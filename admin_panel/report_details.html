<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Details | Wardrobe Admin</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@1.11.1/font/bootstrap-icons.css">
    <style>
        .outfit-card {
            border: 2px solid #f8f9fa;
            border-radius: 15px;
            transition: all 0.3s ease;
        }
        .item-preview {
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 10px;
            width: 100%;
        }
        .status-pill {
            font-size: 0.8rem;
            padding: 0.4rem 1rem;
            border-radius: 20px;
        }
        .action-card {
            border-left: 4px solid;
        }
        .action-card.danger { border-left-color: #dc3545; }
        .action-card.warning { border-left-color: #ffc107; }
        .action-card.success { border-left-color: #198754; }
    </style>
</head>
<body class="bg-light">

    <!-- Top Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-briefcase-fill me-2"></i>Wardrobe Admin
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="users.html">Users</a></li>
                    <li class="nav-item"><a class="nav-link active" href="reports.html">Reports</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="mb-4">
            <a href="reports.html" class="text-decoration-none text-muted mb-2 d-inline-block">
                <i class="bi bi-arrow-left me-1"></i> Back to all reports
            </a>
            <div class="d-flex justify-content-between align-items-center">
                <h2 class="fw-bold mb-0">Report Investigation</h2>
                <div id="report-status-container">
                    <!-- Status Badge -->
                </div>
            </div>
            <p class="text-muted">Report ID: #<span id="display-report-id">...</span></p>
        </div>

        <div class="row g-4">
            <!-- Left: Report Details & Actions -->
            <div class="col-lg-4">
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-header bg-white py-3">
                        <h5 class="mb-0 fw-bold">Incident Report</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="small text-muted text-uppercase fw-bold">Reporter</label>
                            <div class="fw-bold fs-5" id="reporter-name">...</div>
                        </div>
                        <div class="mb-3">
                            <label class="small text-muted text-uppercase fw-bold">Reason for Report</label>
                            <div class="p-3 bg-light rounded mt-1 border" id="report-reason">...</div>
                        </div>
                        <div class="mb-0">
                            <label class="small text-muted text-uppercase fw-bold">Date Submitted</label>
                            <div id="report-date">...</div>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-header bg-white py-3">
                        <h5 class="mb-0 fw-bold">Reported User Profile</h5>
                    </div>
                    <div class="card-body">
                        <div class="d-flex align-items-center mb-3">
                            <img id="reported-user-img" src="assets/img/avatar-placeholder.png" class="rounded-circle border me-3" width="70" height="70" style="object-fit: cover;">
                            <div>
                                <div id="reported-user-name" class="fw-bold fs-5">...</div>
                                <div class="text-muted small">Target User Account</div>
                            </div>
                        </div>
                        <div class="d-flex gap-2">
                             <button class="btn btn-sm btn-outline-primary flex-fill" id="reset-username-btn">
                                <i class="bi bi-pencil-square me-1"></i>Reset Name
                             </button>
                             <button class="btn btn-sm btn-outline-danger flex-fill" id="reset-avatar-btn">
                                <i class="bi bi-person-x-fill me-1"></i>Clear PFP
                             </button>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white py-3">
                        <h5 class="mb-0 fw-bold">Moderation Actions</h5>
                    </div>
                    <div class="card-body p-0">
                        <div class="list-group list-group-flush" id="moderation-controls">
                            <!-- Action buttons -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Content Review -->
            <div class="col-lg-8">
                <div class="card shadow-sm border-0 outfit-card h-100">
                    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                        <h5 class="mb-0 fw-bold">Reported Content Preview</h5>
                        <div id="outfit-owner-badge"></div>
                    </div>
                    <div class="card-body" id="outfit-preview-container">
                        <div class="text-center py-5">
                            <div class="spinner-border text-primary" role="status"></div>
                            <p class="mt-2">Loading content for review...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-auth-compat.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/report_details.js"></script>
</body>
</html>
