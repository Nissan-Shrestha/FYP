<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Options Management | Wardrobe Admin</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        .nav-tabs .nav-link {
            color: #495057;
            font-weight: 500;
        }
        .nav-tabs .nav-link.active {
            color: #0d6efd;
            border-bottom: 3px solid #0d6efd;
        }
    </style>
</head>
<body class="bg-light">

    <!-- Top Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-briefcase-fill me-2"></i>Wardrobe Admin
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="adminNavbar">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="users.html">Users</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="categories.html">App Options</a>
                    </li>
                </ul>
                <div class="d-flex text-white align-items-center">
                    <img id="admin-avatar" src="" class="rounded-circle me-2" width="32" height="32" style="object-fit: cover; display: none;">
                    <i id="admin-avatar-placeholder" class="bi bi-person-circle fs-4 me-2"></i>
                    <span id="admin-name" class="me-3">Admin</span>
                    <a href="#" id="admin-logout" class="btn btn-sm btn-outline-danger">
                        <i class="bi bi-box-arrow-right me-1"></i>Logout
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-5">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white py-3">
                <div class="d-flex justify-content-between align-items-center">
                    <h4 class="fw-bold mb-0">Global App Options</h4>
                    <button class="btn btn-primary" onclick="openAddModal()">
                        <i class="bi bi-plus-lg me-1"></i>Add New Option
                    </button>
                </div>
                <p class="text-muted small mt-2 mb-0">Manage the choices users see in the mobile app for categories, seasons, and more.</p>
            </div>
            
            <div class="card-body">
                <!-- Nav Tabs -->
                <ul class="nav nav-tabs border-0 mb-4" id="optionsTabs" role="tablist">
                    <li class="nav-item">
                        <a class="nav-link active" onclick="switchType('category')">Categories</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" onclick="switchType('season')">Seasons</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" onclick="switchType('occasion')">Occasions</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" onclick="switchType('size')">Sizes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" onclick="switchType('material')">Materials</a>
                    </li>
                </ul>

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Name</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="options-table-body">
                            <!-- Options will be loaded here -->
                            <tr>
                                <td colspan="2" class="text-center py-4">
                                    <div class="spinner-border spinner-border-sm text-primary"></div> Loading...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Option Modal -->
    <div class="modal fade" id="addOptionModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Add New Option</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addOptionForm">
                        <div class="mb-3">
                            <label class="form-label">Type</label>
                            <select class="form-select" id="optionType" disabled>
                                <option value="category">Category</option>
                                <option value="season">Season</option>
                                <option value="occasion">Occasion</option>
                                <option value="size">Size</option>
                                <option value="material">Material</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Value Name</label>
                            <input type="text" class="form-control" id="optionName" placeholder="e.g. Winter, Formal, Denim..." required>
                        </div>
                        <div class="text-end">
                            <button type="button" class="btn btn-secondary me-2" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary">Save Option</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-auth-compat.js"></script>

    <!-- App Scripts -->
    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/categories.js"></script>
</body>
</html>
